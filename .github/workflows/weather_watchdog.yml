name: 🛰️ KisanBaba Climate Watchdog

on:
  schedule:
    - cron: "0 2 * * *" # Runs every day at 02:00 AM UTC (7:30 AM IST)
  workflow_dispatch: # Allows manual trigger

jobs:
  sync_weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js dotenv

      - name: Run Climate Watchdog
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node scripts/weather_sync_bot.js --daily "Andhra Pradesh,Bihar,Chhattisgarh,Gujarat,Haryana,Himachal Pradesh,Jharkhand,Karnataka,Kerala,Madhya Pradesh,Maharashtra,Odisha,Punjab,Rajasthan,Tamil Nadu,Telangana,Uttar Pradesh,Uttarakhand,West Bengal"

      - name: Run Retail Price Watchdog
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node scripts/retail_sync_bot.js
